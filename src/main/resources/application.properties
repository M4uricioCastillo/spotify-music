spring.application.name=spotify-music
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/spotifymusic?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.physical_naming_strategy=com.spotify.music.shared.infrastructure.persistence.jpa.strategy.SnakeCasePhysicalNamingStrategy

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html